[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "N",
    "SIM",
    "ANN",
    "S",
    "PT",
]

ignore = [
    "ANN401",
    "S101",
    "N818"
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
strict = true

plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "fastapi.*",
    "uvicorn.*",
]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S105",
    "S106",
    "ANN",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]